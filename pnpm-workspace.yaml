packages:
  - artifacts/*
  - lib/*
  - lib/integrations/*
  - scripts

autoInstallPeers: false

catalog:
  '@tanstack/react-query': ^5.90.21
  '@types/node': ^25.3.5
  '@types/react': ^19.2.0
  '@types/react-dom': ^19.2.0
  class-variance-authority: ^0.7.1
  clsx: ^2.1.1
  drizzle-orm: ^0.45.2
  framer-motion: ^12.23.24
  lucide-react: ^0.545.0
  react: 19.1.0
  react-dom: 19.1.0
  tailwind-merge: ^3.3.1
  tailwindcss: ^4.1.14
  tsx: ^4.21.0
  zod: ^3.25.76

minimumReleaseAge: 1440

allowBuilds:
  '@stellar/stellar-sdk': false
  '@swc/core': true
  blake-hash: false
  bufferutil: false
  esbuild: true
  msw: true
  protobufjs: true
  sharp: true
  tiny-secp256k1: false
  unrs-resolver: true
  usb: false
  utf-8-validate: false

overrides:
  '@esbuild-kit/esm-loader': npm:tsx@^4.21.0
