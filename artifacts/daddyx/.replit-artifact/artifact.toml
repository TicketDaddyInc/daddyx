kind = "web"
previewPath = "/"
title = "DaddyX — Fan-Powered Event Finance"
version = "1.0.0"
id = "artifacts/daddyx"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25495

[services.development]
run = "pnpm --filter @workspace/daddyx run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/daddyx", "run", "build" ]
publicDir = "artifacts/daddyx/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25495"
BASE_PATH = "/"
